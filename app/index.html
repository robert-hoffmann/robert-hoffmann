<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Robert Hoffmann</title>
    <meta name="author" content="Robert Hoffmann" />
    <meta id="app-theme-color-meta" name="theme-color" content="#1a1a2e" />
    <meta name="color-scheme" content="dark light" />

    <!-- ── Favicons & Manifest ── -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Fonts (self-hosted) ── -->
    <link rel="preload" href="/fonts/inter-latin-var.woff2" as="font" type="font/woff2" crossorigin />
    <link
      data-interactive-preload="true"
      rel="preload"
      href="/parallax/mobile/wallpaper-lqip.webp?v=__PUBLIC_ASSET_VERSION__"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(max-width: 767px)"
    />
    <link
      data-interactive-preload="true"
      rel="preload"
      href="/parallax/desktop/layer-bg-lqip.webp?v=__PUBLIC_ASSET_VERSION__"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 768px)"
    />
    <link
      data-interactive-preload="true"
      rel="preload"
      href="/video-poster-960.avif?v=__PUBLIC_ASSET_VERSION__"
      as="image"
      type="image/avif"
      imagesrcset="/video-poster-640.avif?v=__PUBLIC_ASSET_VERSION__ 640w, /video-poster-960.avif?v=__PUBLIC_ASSET_VERSION__ 960w, /video-poster.avif?v=__PUBLIC_ASSET_VERSION__ 1280w"
      imagesizes="416px"
      fetchpriority="high"
      media="(min-width: 768px)"
    />

    <script data-app-boot="true">
      (function () {
        document.documentElement.dataset.jsEnabled = 'true';

        var shared         = null;
        var storageKey     = '__PORTFOLIO_STATE_KEY__';
        var themeColorMeta = document.getElementById('app-theme-color-meta');

        try {
          var raw = localStorage.getItem(storageKey);
          if (raw) {
            var data = JSON.parse(raw);
            shared = data && data.shared;
          }
        } catch (_) { /* noop */ }

        function syncThemeColor(theme) {
          if (!themeColorMeta) return;
          themeColorMeta.setAttribute('content', theme === 'light' ? '#f5f1fa' : '#1a1a2e');
        }

        function normalizedPathname() {
          var path = window.location.pathname || '/';
          path = path.replace(/\/index\.html$/, '/');
          if (path !== '/' && path.charAt(path.length - 1) !== '/') {
            path += '/';
          }
          return path;
        }

        function isCanonicalContentRoute(path) {
          return path === '/en/' ||
            path === '/fr/' ||
            path.indexOf('/en/') === 0 ||
            path.indexOf('/fr/') === 0;
        }

        function canonicalRouteLocale(path) {
          if (path === '/fr/' || path.indexOf('/fr/') === 0) return 'fr';
          if (path === '/en/' || path.indexOf('/en/') === 0) return 'en';
          if (isCanonicalContentRoute(path)) return 'en';
          return null;
        }

        if (shared && (shared.theme === 'dark' || shared.theme === 'light')) {
          document.documentElement.setAttribute('data-theme', shared.theme);
          syncThemeColor(shared.theme);
        }

        var lang = 'en';
        var routeLocale = canonicalRouteLocale(normalizedPathname());
        if (routeLocale) {
          lang = routeLocale;
        } else if (shared && (shared.locale === 'fr' || shared.locale === 'en')) {
          lang = shared.locale;
        } else {
          var navLangs = navigator.languages || [navigator.language];
          for (var i = 0; i < navLangs.length; i++) {
            var nav = String(navLangs[i] || '').toLowerCase();
            if (nav.indexOf('fr') === 0) { lang = 'fr'; break; }
          }
        }
        document.documentElement.lang = lang;
      })();
    </script>
    <style data-app-boot="true">
      :root {
        --boot-grad-start : #1a0a35;
        --boot-grad-end   : #9964ac;
        --boot-gradient   : linear-gradient(135deg, var(--boot-grad-start), var(--boot-grad-end));
        background        : var(--boot-gradient);
      }

      html,
      body {
        min-height : 100%;
        margin     : 0;
        background : var(--boot-gradient);
      }

      #app {
        min-height   : 100dvh;
        background   : var(--boot-gradient);
      }

      html[data-js-enabled="true"] #app [data-prerender-root][data-prerender-hidden="true"] {
        position    : absolute;
        inline-size : 1px;
        block-size  : 1px;
        margin      : -1px;
        padding     : 0;
        overflow    : hidden;
        clip-path   : inset(50%);
        white-space : nowrap;
        border      : 0;
      }

      html[data-app-mounted="true"] #app [data-prerender-root] {
        display : none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
