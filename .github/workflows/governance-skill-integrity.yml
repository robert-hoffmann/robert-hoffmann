name: governance-skill-integrity

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run governance integrity checks
        shell: bash
        run: |
          .agents/skills/governance-core/scripts/check-skill-integrity.sh

  script-regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run governance script regression tests
        shell: bash
        run: |
          python3 -m unittest discover -s .agents/skills/governance-core/tests/governance_scripts -p 'test_*.py' -v
