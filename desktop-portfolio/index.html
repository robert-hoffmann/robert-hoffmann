    <script>
      (function () {
        try {
          var themeColorMeta = document.getElementById('app-theme-color-meta');
          var storageKey = 'portfolio-state-1';

          function syncThemeColor(theme) {
            if (!themeColorMeta) return;
            themeColorMeta.setAttribute('content', theme === 'light' ? '#f5f1fa' : '#1a1a2e');
          }

          var raw = localStorage.getItem(storageKey);
          if (!raw) return;
          var data = JSON.parse(raw);
          var shared = data && data.shared;
          if (shared && (shared.theme === 'dark' || shared.theme === 'light')) {
            document.documentElement.setAttribute('data-theme', shared.theme);
            syncThemeColor(shared.theme);
          }
        } catch (_) { /* noop */ }
      })();
    </script>

    <!-- Locale: set lang attribute early to prevent FOUC -->
    <script>
      (function () {
        try {
          var lang = 'en';
          var storageKey = 'portfolio-state-1';
          var raw = localStorage.getItem(storageKey);
          var hasSavedLocale = false;

          if (raw) {
            var data = JSON.parse(raw);
            var shared = data && data.shared;
            if (shared && (shared.locale === 'fr' || shared.locale === 'en')) {
              lang = shared.locale;
              hasSavedLocale = true;
            }
          }
          if (!hasSavedLocale) {
            var navLangs = navigator.languages || [navigator.language];
            for (var i = 0; i < navLangs.length; i++) {
              var nav = String(navLangs[i] || '').toLowerCase();
              if (nav.indexOf('fr') === 0) { lang = 'fr'; break; }
            }
          }
          document.documentElement.lang = lang;
        } catch (_) { /* noop */ }
      })();
    </script>
